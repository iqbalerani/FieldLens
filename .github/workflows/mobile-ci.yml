name: Mobile CI

on:
  push:
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - "package.json"
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: TypeScript check (mobile)
        run: npm run typecheck:mobile
